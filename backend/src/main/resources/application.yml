spring:
  application:
    name: timetable-system

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/timetable_db}
    username: ${SPRING_DATASOURCE_USERNAME:timetable_user}
    password: ${SPRING_DATASOURCE_PASSWORD:timetable_dev_pass}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:smart-jadval-secret-key-change-in-production-2024}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    uz.edu.timetable: DEBUG
    org.springframework.security: WARN
    org.flywaydb: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
