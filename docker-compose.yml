version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: timetable_postgres
    environment:
      POSTGRES_DB: timetable_db
      POSTGRES_USER: timetable_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timetable_dev_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timetable_user -d timetable_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - timetable_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: timetable_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_pass}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - timetable_net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timetable_backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/timetable_db
      SPRING_DATASOURCE_USERNAME: timetable_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-timetable_dev_pass}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev_pass}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production-min-32-chars}
      JWT_EXPIRATION_MS: 900000
      JWT_REFRESH_EXPIRATION_MS: 604800000
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - timetable_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: timetable_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
      NEXT_PUBLIC_APP_NAME: "Smart Jadval"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - timetable_net
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: timetable_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - timetable_net
    restart: unless-stopped

volumes:
  postgres_data:
    name: timetable_postgres_data
  redis_data:
    name: timetable_redis_data

networks:
  timetable_net:
    name: timetable_network
    driver: bridge
